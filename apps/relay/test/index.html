<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relay Node Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 16px 24px; background: #16213e; border-bottom: 1px solid #333; }
    header h1 { font-size: 18px; font-weight: 600; }
    header p { font-size: 12px; color: #aaa; margin-top: 4px; }
    .section { padding: 16px 24px; background: #0f3460; border-bottom: 1px solid #333; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .section label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: #aaa; }
    .section input { font-size: 13px; padding: 7px 10px; border-radius: 4px; border: 1px solid #444; background: #1a1a2e; color: #eee; min-width: 200px; }
    .section button { font-size: 13px; padding: 8px 14px; border-radius: 4px; border: none; cursor: pointer; font-weight: 500; align-self: flex-end; }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-secondary { background: #533483; color: #fff; }
    .btn-primary:disabled, .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
    .status-bar { padding: 6px 24px; font-size: 12px; color: #aaa; background: #16213e; display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #f44336; }
    .dot.on { background: #4caf50; }
    #log { flex: 1; padding: 16px 24px; font-family: "SF Mono", "Fira Code", monospace; font-size: 13px; line-height: 1.6; overflow-y: auto; white-space: pre-wrap; }
    .log-in  { color: #81d4fa; }
    .log-out { color: #a5d6a7; }
    .log-err { color: #ef9a9a; }
    .log-sys { color: #aaa; }
  </style>
</head>
<body>
  <header>
    <h1>Relay Node Test (/ws)</h1>
    <p>Connects as a node (not a client). JWT is minted in-browser from the known dev secret.</p>
  </header>

  <div class="section">
    <label>Relay URL
      <input id="relay-url" value="ws://localhost:8788" />
    </label>
    <label>JWT Secret
      <input id="jwt-secret" value="yishan" />
    </label>
    <label>Node ID
      <input id="node-id" value="test-node-1" />
    </label>
    <label>User ID (sub)
      <input id="user-id" value="test-user-1" />
    </label>
    <label>Org IDs (comma-separated)
      <input id="org-ids" value="org-1" />
    </label>
    <button class="btn-primary" id="btn-connect" onclick="connect()">Connect</button>
    <button class="btn-secondary" id="btn-disconnect" onclick="disconnect()" disabled>Disconnect</button>
  </div>

  <div class="section" id="actions" style="display:none">
    <label>terminal.session.changed payload (JSON)
      <input id="tsc-payload" value='{"sessionId":"sess-1","workspaceId":"ws-1","action":"created"}' style="min-width:420px" />
    </label>
    <button class="btn-secondary" onclick="sendTerminalSessionChanged()">Send terminal.session.changed</button>
    <button class="btn-secondary" onclick="sendPong()">Send relay.pong</button>
  </div>

  <div class="status-bar">
    <span class="dot" id="dot"></span>
    <span id="status-text">Disconnected</span>
  </div>

  <div id="log"><span class="log-sys">Ready. Fill in the fields above and click Connect.\n</span></div>

  <!-- jose for client-side HS256 JWT minting (ESM via CDN) -->
  <script type="module">
    import { SignJWT } from 'https://cdn.jsdelivr.net/npm/jose@5/+esm';

    let ws = null;

    function log(text, cls = 'log-sys') {
      const el = document.getElementById('log');
      const span = document.createElement('span');
      span.className = cls;
      span.textContent = `[${new Date().toISOString().slice(11,23)}] ${text}\n`;
      el.appendChild(span);
      el.scrollTop = el.scrollHeight;
    }

    function setConnected(on, label) {
      document.getElementById('dot').className = 'dot' + (on ? ' on' : '');
      document.getElementById('status-text').textContent = label;
      document.getElementById('btn-connect').disabled = on;
      document.getElementById('btn-disconnect').disabled = !on;
      document.getElementById('actions').style.display = on ? 'flex' : 'none';
    }

    async function mintJWT() {
      const secret = document.getElementById('jwt-secret').value.trim();
      const nodeId = document.getElementById('node-id').value.trim();
      const userId = document.getElementById('user-id').value.trim();
      const orgIds = document.getElementById('org-ids').value.split(',').map(s => s.trim()).filter(Boolean);

      const key = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(secret),
        { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
      );

      return new SignJWT({ nodeId, organizationIds: orgIds })
        .setProtectedHeader({ alg: 'HS256' })
        .setSubject(userId)
        .setExpirationTime('1h')
        .sign(key);
    }

    window.connect = async function() {
      const relayUrl = document.getElementById('relay-url').value.trim().replace(/\/+$/, '');
      try {
        const token = await mintJWT();
        log(`Minted JWT: ${token.slice(0, 40)}…`);
        const url = `${relayUrl}/ws?access_token=${encodeURIComponent(token)}`;
        ws = new WebSocket(url);

        ws.onopen = () => {
          setConnected(true, `Connected as ${document.getElementById('node-id').value}`);
          log('WebSocket open', 'log-out');
        };

        ws.onmessage = (event) => {
          const raw = event.data;
          log(`← ${raw}`, 'log-in');
          try {
            const msg = JSON.parse(raw);
            if (msg.method === 'relay.ping') {
              const pong = JSON.stringify({ jsonrpc: '2.0', method: 'relay.pong' });
              ws.send(pong);
              log(`→ ${pong} (auto-pong)`, 'log-out');
            }
          } catch (_) {}
        };

        ws.onclose = (e) => {
          setConnected(false, `Disconnected (${e.code})`);
          log(`WebSocket closed: code=${e.code} reason=${e.reason || '—'}`, 'log-err');
          ws = null;
        };

        ws.onerror = () => log('WebSocket error', 'log-err');

      } catch (err) {
        log(`Error: ${err.message}`, 'log-err');
      }
    };

    window.disconnect = function() {
      if (ws) { ws.close(); ws = null; }
    };

    window.sendTerminalSessionChanged = function() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      let params;
      try {
        params = JSON.parse(document.getElementById('tsc-payload').value);
      } catch (e) {
        log(`Invalid JSON: ${e.message}`, 'log-err');
        return;
      }
      const msg = JSON.stringify({ jsonrpc: '2.0', method: 'terminal.session.changed', params });
      ws.send(msg);
      log(`→ ${msg}`, 'log-out');
    };

    window.sendPong = function() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const msg = JSON.stringify({ jsonrpc: '2.0', method: 'relay.pong' });
      ws.send(msg);
      log(`→ ${msg}`, 'log-out');
    };
  </script>
</body>
</html>

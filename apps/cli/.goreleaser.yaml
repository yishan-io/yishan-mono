version: 2

project_name: yishan-cli

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  # macOS: CGO required for the FSEvents-backed recursive watcher.
  # Cross-compiling darwin/amd64 from an arm64 host requires pointing the
  # C compiler at the x86_64 slice of the universal Apple clang toolchain:
  #   CC="clang -arch x86_64 -mmacosx-version-min=10.15"
  - id: yishan-darwin
    main: .
    binary: yishan
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X yishan/apps/cli/internal/buildinfo.Version={{.Version}}

  # Linux and Windows: no CGO needed — the pure-Go fsnotify watcher is used
  # on non-Darwin platforms (//go:build !darwin).
  - id: yishan-other
    main: .
    binary: yishan
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X yishan/apps/cli/internal/buildinfo.Version={{.Version}}

archives:
  - id: yishan-archive
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

brews:
  - name: yishan
    repository:
      owner: yishan-io
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/yishan-io/yishan-mono"
    description: "CLI and local daemon for Yishan"
    license: "Elastic-2.0"
    install: |
      bin.install "yishan"

changelog:
  use: git

release:
  name_template: "Yishan v{{.Version}}"
  prerelease: true

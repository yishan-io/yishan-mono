name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (x.y.z). Defaults to apps/desktop/package.json version."
        required: false
        default: ""
        type: string
      draft:
        description: "Create the GitHub release as a draft"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            version="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          else
            version="$(jq -r .version apps/desktop/package.json)"
          fi
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "Resolved version: $version"

  cli:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/cli/go.mod
          cache-dependency-path: apps/cli/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          workdir: apps/cli
          args: >-
            release --clean --config .goreleaser.yaml
            ${{ !startsWith(github.ref, 'refs/tags/') && '--snapshot' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ needs.resolve-version.outputs.version }}

  desktop:
    needs: [resolve-version, cli]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            goos: darwin
            goarch: arm64
          - os: ubuntu-latest
            platform: linux
            goos: linux
            goarch: amd64
    runs-on: ${{ matrix.os }}
    env:
      YISHAN_APP_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile --linker hoisted

      - name: Download CLI binary from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ needs.resolve-version.outputs.version }}"
          archive="yishan-cli_${version}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tag="v${version}"

          mkdir -p apps/desktop/dist/resources

          # Download the CLI archive from the GitHub release created by GoReleaser
          gh release download "$tag" --pattern "$archive" --dir /tmp
          tar -xzf "/tmp/$archive" -C /tmp
          cp /tmp/yishan apps/desktop/dist/resources/yishan
          chmod +x apps/desktop/dist/resources/yishan

      - name: Build renderer and electron
        working-directory: apps/desktop
        run: bun run build

      # macOS code signing & notarization
      - name: Import macOS signing certificate
        if: matrix.platform == 'mac'
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          if [[ -z "$CSC_LINK" ]]; then
            echo "::warning::No macOS signing certificate configured. Skipping."
            exit 0
          fi
          echo "Certificate configured via CSC_LINK"

      - name: Resolve electron version
        id: electron
        working-directory: apps/desktop
        run: |
          version=$(node -e "const p=require('./node_modules/electron/package.json');console.log(p.version)" 2>/dev/null \
            || node -e "const p=require('../../node_modules/electron/package.json');console.log(p.version)")
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "Resolved electron version: $version"

      - name: Build & package Electron app
        working-directory: apps/desktop
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          bunx electron-builder
          --publish never
          -c.electronVersion=${{ steps.electron.outputs.version }}
          -c.extraMetadata.version=${{ needs.resolve-version.outputs.version }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.rpm
            apps/desktop/release/*.snap
            apps/desktop/release/latest*.yml
            apps/desktop/release/latest*.yaml
          if-no-files-found: warn

  release-desktop:
    needs: [resolve-version, desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: desktop-*
          merge-multiple: true

      - name: List release artifacts
        run: ls -lhR artifacts/

      - name: Generate desktop release notes
        run: |
          set -euo pipefail
          version="${{ needs.resolve-version.outputs.version }}"
          tag="v${version}"
          previous_tag="$(git tag --list 'v*' --sort=-version:refname | grep -Fxv "$tag" | head -n1 || true)"

          {
            echo "## Desktop changes"
            echo
            if [[ -n "$previous_tag" ]]; then
              echo "Changes since \`$previous_tag\`."
              echo
              log_output="$(git log --no-merges --pretty=format:'- %s (%h)' "$previous_tag..HEAD" -- apps/desktop packages/design-tokens packages/core || true)"
            else
              echo "Changes in this release."
              echo
              log_output="$(git log --no-merges --pretty=format:'- %s (%h)' HEAD -- apps/desktop packages/design-tokens packages/core || true)"
            fi

            if [[ -n "${log_output:-}" ]]; then
              echo "$log_output"
            else
              echo "- No desktop-scoped commits found in this range."
            fi
          } > notes-desktop.md

      - name: Upload desktop artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${{ needs.resolve-version.outputs.version }}"
          tag="v${version}"

          # Collect desktop release files
          shopt -s nullglob
          files=(artifacts/*.dmg artifacts/*.zip artifacts/*.AppImage artifacts/*.deb artifacts/*.rpm artifacts/*.snap artifacts/latest*.yml artifacts/latest*.yaml)
          shopt -u nullglob

          if [[ ${#files[@]} -gt 0 ]]; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            echo "::warning::No desktop artifacts found to upload."
          fi

          # Append desktop release notes
          existing_notes="$(gh release view "$tag" --json body --jq .body)"
          combined_notes="${existing_notes}

          $(cat notes-desktop.md)"
          echo "$combined_notes" > combined-notes.md
          gh release edit "$tag" --notes-file combined-notes.md --title "Yishan v${version}"

          # Verify auto-update manifests were uploaded
          if ! gh release view "$tag" --json assets --jq '.assets[].name' | grep -qE '\.yml$'; then
            echo "::warning::No .yml auto-update manifest found in release assets. Auto-update may not work."
          fi

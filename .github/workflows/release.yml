name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (x.y.z). Defaults to apps/desktop/package.json version."
        required: false
        default: ""
        type: string
      draft:
        description: "Create the GitHub release as a draft"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            version="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          else
            version="$(jq -r .version apps/desktop/package.json)"
          fi
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "Resolved version: $version"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.version.outputs.version }}"
          tag="v${version}"
          # Check for any existing release (draft or published) for this tag.
          if gh release view "$tag" &>/dev/null; then
            echo "Release $tag already exists — skipping creation."
          else
            gh release create "$tag" \
              --title "Yishan v${version}" \
              --draft=${{ inputs.draft || 'true' }} \
              --notes "Release v${version}"
          fi

  cli:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarches: arm64,amd64
            binary: yishan
          - os: ubuntu-latest
            goos: linux
            goarches: amd64,arm64
            binary: yishan
          - os: windows-latest
            goos: windows
            goarches: amd64,arm64
            binary: yishan.exe
    runs-on: ${{ matrix.os }}
    env:
      YISHAN_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/cli/go.mod
          cache-dependency-path: apps/cli/go.sum

      - name: Install Linux ARM64 cross-compiler
        if: matrix.goos == 'linux'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binaries
        shell: bash
        working-directory: apps/cli
        run: |
          set -euo pipefail
          version="${YISHAN_VERSION}"
          ldflags="-s -w -X 'yishan/apps/cli/internal/buildinfo.Version=${version}'"
          goos="${{ matrix.goos }}"
          mkdir -p bin
          IFS=',' read -ra goarches <<< "${{ matrix.goarches }}"
          for goarch in "${goarches[@]}"; do
            echo "::group::Building ${goos}/${goarch}"
            if [[ "${goos}" == "windows" ]]; then
              outfile="bin/yishan_${goarch}.exe"
            else
              outfile="bin/yishan_${goarch}"
            fi
            if [[ "${goos}" == "darwin" && "${goarch}" == "amd64" ]]; then
              # Cross-compile darwin/amd64 from the arm64 macOS runner using
              # Apple's universal clang targeting the x86_64 slice.
              CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
                CC="clang -arch x86_64 -mmacosx-version-min=10.15" \
                go build -ldflags "${ldflags}" -o "${outfile}" .
            elif [[ "${goos}" == "darwin" ]]; then
              CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
                go build -ldflags "${ldflags}" -o "${outfile}" .
            else
              # Linux and Windows: pure-Go fsnotify watcher, no CGO needed.
              CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
                go build -ldflags "${ldflags}" -o "${outfile}" .
            fi
            echo "::endgroup::"
          done

      - name: Package archives
        shell: bash
        working-directory: apps/cli
        run: |
          set -euo pipefail
          version="${YISHAN_VERSION}"
          goos="${{ matrix.goos }}"
          binary="${{ matrix.binary }}"
          tmp_dir="$(cygpath -u "$RUNNER_TEMP" 2>/dev/null || echo "$RUNNER_TEMP")"
          archives=""
          IFS=',' read -ra goarches <<< "${{ matrix.goarches }}"
          for goarch in "${goarches[@]}"; do
            staging="$(mktemp -d)"
            if [[ "${goos}" == "windows" ]]; then
              cp "bin/yishan_${goarch}.exe" "${staging}/${binary}"
            else
              cp "bin/yishan_${goarch}" "${staging}/${binary}"
            fi
            archive="yishan-cli_${version}_${goos}_${goarch}.tar.gz"
            tar -czf "${tmp_dir}/${archive}" -C "${staging}" "${binary}"
            if command -v sha256sum &>/dev/null; then
              checksum=$(sha256sum "${tmp_dir}/${archive}" | awk '{print $1}')
            else
              checksum=$(certutil -hashfile "$(cygpath -w "${tmp_dir}/${archive}")" SHA256 | sed -n '2p' | tr -d ' \r')
            fi
            echo "${checksum}  ${archive}" >> "${tmp_dir}/checksums.txt"
            archives="${archives} ${tmp_dir}/${archive}"
          done
          echo "ARCHIVES=${archives}" >> "$GITHUB_ENV"
          echo "TMP_DIR=${tmp_dir}" >> "$GITHUB_ENV"

      - name: Upload CLI archives to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.resolve-version.outputs.version }}"
          tag="v${version}"
          # shellcheck disable=SC2086
          gh release upload "$tag" $ARCHIVES --clobber
          # Upload combined checksums fragment
          gh release upload "$tag" "$TMP_DIR/checksums.txt" --clobber || true

  desktop:
    needs: [resolve-version, cli]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            goos: darwin
          - os: ubuntu-latest
            platform: linux
            goos: linux
            goarch: amd64
    runs-on: ${{ matrix.os }}
    env:
      YISHAN_APP_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile --linker hoisted

      - name: Download CLI binary from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ needs.resolve-version.outputs.version }}"
          tag="v${version}"
          goos="${{ matrix.goos }}"

          mkdir -p apps/desktop/dist/resources

          if [[ "$goos" == "darwin" ]]; then
            # macOS: download both arm64 and amd64 CLI binaries so the
            # beforePack hook can place the correct one per arch build.
            for arch in arm64 amd64; do
              archive="yishan-cli_${version}_darwin_${arch}.tar.gz"
              gh release download "$tag" --pattern "$archive" --dir /tmp
              tar -xzf "/tmp/$archive" -C /tmp
              cp /tmp/yishan "apps/desktop/dist/resources/yishan-${arch}"
              chmod +x "apps/desktop/dist/resources/yishan-${arch}"
              rm /tmp/yishan
            done
            # Default to arm64 for initial resource copy (beforePack overrides)
            cp apps/desktop/dist/resources/yishan-arm64 apps/desktop/dist/resources/yishan
          else
            archive="yishan-cli_${version}_${goos}_${{ matrix.goarch }}.tar.gz"
            gh release download "$tag" --pattern "$archive" --dir /tmp
            tar -xzf "/tmp/$archive" -C /tmp
            cp /tmp/yishan apps/desktop/dist/resources/yishan
            chmod +x apps/desktop/dist/resources/yishan
          fi

      - name: Build renderer and electron
        working-directory: apps/desktop
        run: bun run build

      # macOS code signing & notarization
      - name: Import macOS signing certificate
        if: matrix.platform == 'mac'
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          if [[ -z "$CSC_LINK" ]]; then
            echo "::warning::No macOS signing certificate configured. Skipping."
            exit 0
          fi
          echo "Certificate configured via CSC_LINK"

      - name: Resolve electron version
        id: electron
        working-directory: apps/desktop
        run: |
          version=$(node -e "const p=require('./node_modules/electron/package.json');console.log(p.version)" 2>/dev/null \
            || node -e "const p=require('../../node_modules/electron/package.json');console.log(p.version)")
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "Resolved electron version: $version"

      - name: Build & package Electron app
        working-directory: apps/desktop
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          bunx electron-builder
          --publish never
          -c.electronVersion=${{ steps.electron.outputs.version }}
          -c.extraMetadata.version=${{ needs.resolve-version.outputs.version }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.rpm
            apps/desktop/release/*.snap
            apps/desktop/release/latest*.yml
            apps/desktop/release/latest*.yaml
          if-no-files-found: warn

  release-desktop:
    needs: [resolve-version, desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: desktop-*
          merge-multiple: true

      - name: List release artifacts
        run: ls -lhR artifacts/

      - name: Generate release notes
        run: |
          set -euo pipefail
          version="${{ needs.resolve-version.outputs.version }}"
          tag="v${version}"
          previous_tag="$(git tag --list 'v*' --sort=-version:refname | grep -Fxv "$tag" | head -n1 || true)"

          {
            echo "## CLI changes"
            echo
            if [[ -n "$previous_tag" ]]; then
              echo "Changes since \`$previous_tag\`."
              echo
              log_output="$(git log --no-merges --pretty=format:'- %s (%h)' "$previous_tag..HEAD" -- apps/cli || true)"
            else
              echo "Changes in this release."
              echo
              log_output="$(git log --no-merges --pretty=format:'- %s (%h)' HEAD -- apps/cli || true)"
            fi

            if [[ -n "${log_output:-}" ]]; then
              echo "$log_output"
            else
              echo "- No cli-scoped commits found in this range."
            fi
            echo
            echo "## Desktop changes"
            echo
            if [[ -n "$previous_tag" ]]; then
              echo "Changes since \`$previous_tag\`."
              echo
              log_output="$(git log --no-merges --pretty=format:'- %s (%h)' "$previous_tag..HEAD" -- apps/desktop packages/design-tokens packages/core || true)"
            else
              echo "Changes in this release."
              echo
              log_output="$(git log --no-merges --pretty=format:'- %s (%h)' HEAD -- apps/desktop packages/design-tokens packages/core || true)"
            fi

            if [[ -n "${log_output:-}" ]]; then
              echo "$log_output"
            else
              echo "- No desktop-scoped commits found in this range."
            fi
          } > notes-release.md

      - name: Upload desktop artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${{ needs.resolve-version.outputs.version }}"
          tag="v${version}"

          # Collect desktop release files
          shopt -s nullglob
          files=(artifacts/*.dmg artifacts/*.zip artifacts/*.AppImage artifacts/*.deb artifacts/*.rpm artifacts/*.snap artifacts/latest*.yml artifacts/latest*.yaml)
          shopt -u nullglob

          if [[ ${#files[@]} -gt 0 ]]; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            echo "::warning::No desktop artifacts found to upload."
          fi

          gh release edit "$tag" --notes-file notes-release.md --title "Yishan v${version}"

          # Verify auto-update manifests were uploaded
          if ! gh release view "$tag" --json assets --jq '.assets[].name' | grep -qE '\.yml$'; then
            echo "::warning::No .yml auto-update manifest found in release assets. Auto-update may not work."
          fi

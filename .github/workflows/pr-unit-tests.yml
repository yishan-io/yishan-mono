name: PR Unit Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-unit-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  bun-unit-tests:
    name: Bun unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-service
            working-directory: apps/api-service
            command: bun run test
          - name: desktop
            working-directory: apps/desktop
            command: bunx vitest run
          - name: design-tokens
            working-directory: packages/design-tokens
            command: bun run test
          - name: pi-memory
            working-directory: packages/pi-memory
            command: bun run test
          - name: pi-workspace
            working-directory: packages/pi-workspace
            command: bun run test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile --linker hoisted

      - name: Run ${{ matrix.name }} unit tests
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.command }}

  go-unit-tests:
    name: Go unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/cli/go.mod
          cache-dependency-path: apps/cli/go.sum

      - name: Run CLI unit tests
        working-directory: apps/cli
        env:
          CGO_ENABLED: "0"
        run: go test ./...

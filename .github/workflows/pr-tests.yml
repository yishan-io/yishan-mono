name: PR Test Pipeline

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-quality-check:
    name: Validate CLA, issue link, change type, and testing notes
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR template requirements
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            echo "Skipping PR template checks for event: ${GITHUB_EVENT_NAME}"
            exit 0
          fi

          PR_BODY="$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")"

          fail() {
            echo "::error::$1"
            exit 1
          }

          if ! echo "$PR_BODY" | grep -Eiq '\- \[[xX]\] I have read `CONTRIBUTING\.md`'; then
            fail "PR must confirm CONTRIBUTING.md acknowledgment by checking the compliance checkbox."
          fi

          if ! echo "$PR_BODY" | grep -Eiq '\- \[[xX]\] I agree to the Contributor License Agreement terms in `docs/legal/ICLA\.md` or `docs/legal/CCLA\.md`'; then
            fail "PR must confirm CLA agreement by checking the compliance checkbox."
          fi

          if ! echo "$PR_BODY" | grep -Eiq "\- \[[xX]\] I agree this contribution may be licensed under this repository's license terms"; then
            fail "PR must confirm repository licensing terms by checking the compliance checkbox."
          fi

          if ! echo "$PR_BODY" | grep -Eiq '\- \[[xX]\] (Bug fix|New feature|Documentation|Refactor|Other \(describe in Summary\))'; then
            fail "PR must select at least one Type of Change checkbox."
          fi

          release_label_count="$(jq -r '
            (.pull_request.labels // [])
            | map(
                .name
                | select(
                    test("^(release:(feature|fix|improvement|docs)|skip-release-notes)$")
                  )
              )
            | length
          ' "$GITHUB_EVENT_PATH")"

          if [ "$release_label_count" -eq 0 ]; then
            fail "PR must include exactly one release label: release:feature, release:fix, release:improvement, release:docs, or skip-release-notes."
          fi

          if [ "$release_label_count" -gt 1 ]; then
            fail "PR has multiple release labels. Keep exactly one release label."
          fi

          if ! echo "$PR_BODY" | grep -Eiq '(close[sd]?|fix(e[sd])?|resolve[sd]?) *#[0-9]+' \
            && ! echo "$PR_BODY" | grep -Eiq '\bN/?A\b'; then
            fail "PR must include a related issue reference (for example, closes #123) or write N/A with reason."
          fi

          testing_section="$(echo "$PR_BODY" | awk '
            BEGIN { in_section = 0 }
            /^[[:space:]]*##[[:space:]]+Testing Notes/ { in_section = 1; next }
            /^[[:space:]]*##[[:space:]]+/ { if (in_section) exit }
            in_section { print }
          ')"

          normalized_testing="$(printf '%s' "$testing_section" | sed '/^[[:space:]]*$/d' | tr -s '[:space:]' ' ' | sed 's/^ //; s/ $//')"
          placeholder="Describe how you verified this PR. Include key commands, scenarios, or screenshots when relevant."

          if [ -z "$normalized_testing" ] || [ "$normalized_testing" = "$placeholder" ]; then
            fail "PR must provide non-placeholder Testing Notes."
          fi

          echo "PR quality checks passed."

  quality:
    name: Typecheck, lint, and unit tests
    runs-on: ubuntu-latest
    needs: pr-quality-check
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: SKIP_INSTALL_SIMPLE_GIT_HOOKS=1 bun install --frozen-lockfile --linker hoisted

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test:unit

      - name: Build
        run: bun run build

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: SKIP_INSTALL_SIMPLE_GIT_HOOKS=1 bun install --frozen-lockfile --linker hoisted

      - name: Run end-to-end tests
        env:
          CI: true
        run: xvfb-run -a bun run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
